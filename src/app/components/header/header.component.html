<header class="bg-gray-800" *ngIf="loggedIn">
  <div class="flex max-w-7xl mx-auto justify-between items-center p-4 text-white px-4">
    <div class="text-3xl font-bold">{{ username | titlecase }}</div>
    <div>
      <input type="text" placeholder="Search hero..." class="px-2 py-1 rounded-md text-black"
             (input)="onSearchInputChange($event)">
    </div>
    <div>
      <button class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded-md"
              (click)="logout()">Logout
      </button>
    </div>
  </div>
</header>
